<!DOCTYPE html>
<html lang="uk" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <meta name="theme-color" content="#f6f8fa" id="theme-color-meta">
    
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16' fill='%230969da'><path d='M7.424 1.157a1.25 1.25 0 0 1 1.152 0l6.25 3.018a1.25 1.25 0 0 1 0 2.25l-6.25 3.018a1.25 1.25 0 0 1-1.152 0L1.174 6.425a1.25 1.25 0 0 1 0-2.25l6.25-3.018Z'/><path d='M3.75 8.423v2.827c0 .524.316.999.805 1.201l2.925 1.21a1.25 1.25 0 0 0 .94 0l2.925-1.21a1.3 1.3 0 0 0 .805-1.201V8.423l-3.652 1.764a1.25 1.25 0 0 1-1.152 0L3.75 8.423Z'/></svg>">
    <title>Тестген</title>

    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-theme', savedTheme);
        if (savedTheme === 'dark') {
            document.getElementById('theme-color-meta')?.setAttribute('content', '#0d1117');
        }
    </script>

    <style>
        /* GITHUB PRIMER COLORS */
        :root[data-theme="light"] {
            color-scheme: light;
            --color-canvas-body: #f6f8fa;
            --color-canvas-overlay: #ffffff;
            --color-border-default: #d0d7de;
            --color-border-muted: hsla(210,18%,87%,1);
            --color-fg-default: #24292f;
            --color-fg-muted: #57606a;
            --color-accent-fg: #0969da;
            --color-accent-muted: rgba(9, 105, 218, 0.1);
            --color-success-emphasis: #2da44e;
            --color-success-hover: #2c974b;
            --color-danger-fg: #cf222e;
            --color-danger-hover: #a40e26;
            --color-diff-add-bg: rgba(45, 164, 78, 0.15);
            --color-diff-del-bg: rgba(207, 34, 46, 0.15);
            --color-btn-bg: #f6f8fa;
            --color-btn-border: rgba(27, 31, 36, 0.15);
            --color-btn-hover-bg: #f3f4f6;
            --color-nav-bg: #ffffff;
            --color-overlay: rgba(36, 41, 47, 0.4);
            --color-shadow-medium: 0 8px 24px rgba(140, 149, 159, 0.2);
        }

        :root[data-theme="dark"] {
            color-scheme: dark;
            --color-canvas-body: #0d1117;
            --color-canvas-overlay: #161b22;
            --color-border-default: #30363d;
            --color-border-muted: #21262d;
            --color-fg-default: #c9d1d9;
            --color-fg-muted: #8b949e;
            --color-accent-fg: #58a6ff;
            --color-accent-muted: rgba(88, 166, 255, 0.1);
            --color-success-emphasis: #238636;
            --color-success-hover: #2ea043;
            --color-danger-fg: #f85149;
            --color-danger-hover: #da3633;
            --color-diff-add-bg: rgba(46,160,67,0.15);
            --color-diff-del-bg: rgba(248,81,73,0.15);
            --color-btn-bg: #21262d;
            --color-btn-border: rgba(240, 246, 252, 0.1);
            --color-btn-hover-bg: #30363d;
            --color-nav-bg: #161b22;
            --color-overlay: rgba(1, 4, 9, 0.8);
            --color-shadow-medium: 0 8px 24px rgba(1, 4, 9, 0.8);
        }

        /* RESET & BASE */
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--color-canvas-body); 
            color: var(--color-fg-default); 
            margin: 0; padding: 40px 20px; line-height: 1.5; font-size: 14px;
            min-height: 100vh; overflow-x: hidden;
        }

        /* UTILITY CLASSES */
        .flex { display: flex; }
        .flex-col { display: flex; flex-direction: column; }
        .items-center { align-items: center; }
        .items-start { align-items: flex-start; }
        .justify-between { justify-content: space-between; }
        .justify-end { justify-content: flex-end; }
        .justify-center { justify-content: center; }
        .gap-8 { gap: 8px; }
        .gap-12 { gap: 12px; }
		.gap-16 { gap: 16px; }
        
        .mt-4 { margin-top: 4px; }
        .mt-8 { margin-top: 8px; }
        .mt-12 { margin-top: 12px; }
        .mt-16 { margin-top: 16px; }
        .mt-24 { margin-top: 24px; }
        .mt-32 { margin-top: 32px; }
        
        .mb-0 { margin-bottom: 0 !important; }
        .mb-4 { margin-bottom: 4px; }
        .mb-8 { margin-bottom: 8px; }
        .mb-12 { margin-bottom: 12px; }
        .mb-16 { margin-bottom: 16px; }
        .mb-24 { margin-bottom: 24px; }
        .mb-32 { margin-bottom: 32px; }
        
        .mr-6 { margin-right: 6px; }
        .ml-6 { margin-left: 6px; }
        .ml-8 { margin-left: 8px; }
        
        .p-16 { padding: 16px; }
        .pb-12 { padding-bottom: 12px; }
        .pb-16 { padding-bottom: 16px; }
        
        .w-80 { width: 80px; }
        .w-100 { width: 100%; }
        
        .fs-12 { font-size: 12px; }
        .fs-14 { font-size: 14px; }
        .fs-16 { font-size: 16px; }
        .fs-24 { font-size: 24px; }
        .fs-40 { font-size: 40px; line-height: 1; }
        
        .fw-500 { font-weight: 500; }
        .fw-600 { font-weight: 600; }
        
        .block { display: block; }
        .text-center { text-align: center; }
        .cursor-default { cursor: default !important; }
        
        .text-muted { color: var(--color-fg-muted); }
        .text-default { color: var(--color-fg-default); }
        .text-success { color: var(--color-success-emphasis); }
        .text-danger { color: var(--color-danger-fg); }

        .border-bottom { border-bottom: 1px solid var(--color-border-muted); }

        /* SVG ICONS */
        .icon { width: 16px; height: 16px; fill: currentColor; }
        .icon-lg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

        /* ANIMATIONS & TRANSITIONS */
        .btn, .q-dot { transition: background-color 0.1s ease, border-color 0.1s ease, color 0.1s ease, fill 0.1s ease; }
        input[type="radio"], input[type="radio"]:checked { transition: border 0.15s ease, border-color 0.15s ease; }
        .form-checkbox, .form-checkbox::after { transition: background-color 0.15s ease, border-color 0.15s ease, transform 0.2s ease; }

        .review-item { margin-bottom: 32px; }

        /* FOCUS OUTLINES (ACCESSIBILITY) */
        :focus-visible { outline: 2px solid var(--color-accent-fg); outline-offset: 2px; border-radius: 4px; }
        .btn:focus-visible { outline-offset: -2px; }

        /* TYPOGRAPHY & LAYOUT */
        .container { 
            max-width: 960px; margin: 0 auto;
            background-color: var(--color-canvas-overlay);
            border: 1px solid var(--color-border-default);
            border-radius: 6px; padding: 32px;
            box-shadow: 0 1px 3px rgba(27,31,36,0.04);
        }

        h1, h2, h3 { margin: 0; font-weight: 600; }
        hr { border: none; border-top: 1px solid var(--color-border-muted); margin: 24px 0; width: 100%; }

        /* FORM ELEMENTS */
        input[type="number"] {
            padding: 5px 12px; font-size: 14px; line-height: 20px;
            color: var(--color-fg-default); background-color: var(--color-canvas-body);
            border: 1px solid var(--color-border-default); border-radius: 6px; outline: none;
        }
        input[type="number"]:focus { border-color: var(--color-accent-fg); box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3); }

        .select-wrapper { position: relative; display: inline-block; width: 100%; max-width: 400px; }
        .select-wrapper select {
            width: 100%; padding: 5px 32px 5px 12px; font-size: 14px; line-height: 20px;
            color: var(--color-fg-default); background-color: var(--color-canvas-body);
            border: 1px solid var(--color-border-default); border-radius: 6px;
            appearance: none; -webkit-appearance: none; outline: none; cursor: pointer;
        }
        .select-wrapper select:focus { border-color: var(--color-accent-fg); box-shadow: 0 0 0 3px rgba(9, 105, 218, 0.3); }
        .select-wrapper::after {
            content: ""; position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
            width: 10px; height: 6px; background-color: var(--color-fg-muted);
            clip-path: polygon(100% 0%, 0 0%, 50% 100%); pointer-events: none;
        }

        /* BOX COMPONENT */
        .Box { background-color: var(--color-canvas-overlay); border: 1px solid var(--color-border-default); border-radius: 6px; overflow: hidden; }
        .Box-header { background-color: var(--color-canvas-body); padding: 12px 16px; border-bottom: 1px solid var(--color-border-default); font-weight: 600; font-size: 14px; margin: 0; }
		.Box-row { 
			padding: 16px; 
			border-top: 1px solid var(--color-border-muted); 
			display: flex; 
			align-items: flex-start; 
			cursor: pointer; 
			box-shadow: inset 0 0 0 transparent;
			transition: background-color 0.2s ease, box-shadow 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
		}
        .Box-row:first-of-type { border-top: none; }
        #question-wrapper .Box-row.locked { cursor: default; pointer-events: none; }

        /* BUTTONS */
        .btn { 
            background-color: var(--color-btn-bg); color: var(--color-fg-default); padding: 5px 16px; 
            border: 1px solid var(--color-btn-border); border-radius: 6px; cursor: pointer; font-size: 14px; 
            font-weight: 500; line-height: 20px; height: 32px; display: inline-flex; align-items: center; justify-content: center;
        }
        .btn-primary { background-color: var(--color-success-emphasis); color: #ffffff; border-color: rgba(27, 31, 36, 0.15); }
        .btn-danger { color: var(--color-danger-fg); border-color: var(--color-btn-border); }

        .btn-theme { 
            width: 32px; height: 32px; padding: 0; border: none; background: transparent; 
            box-shadow: none; color: var(--color-fg-muted); 
        }
		
		@media (hover: hover) {
			#question-wrapper .Box-row:hover { background-color: var(--color-canvas-body); }
			.btn:hover { background-color: var(--color-btn-hover-bg); }
			.btn-primary:hover { background-color: var(--color-success-hover); color: #ffffff;}
			.btn-danger:hover { background-color: var(--color-danger-hover); color: #ffffff; border-color: var(--color-danger-hover); }
			.btn-theme:hover { color: var(--color-fg-default); background: var(--color-btn-hover-bg); }
			.btn-back-top:hover { border-color: var(--color-accent-fg); }
		}
		
		@media (hover: none) {
			#question-wrapper .Box-row:not(.locked):active { background-color: var(--color-canvas-body); }
			
			.btn:active { background-color: var(--color-btn-hover-bg); }
			.btn-primary:active { background-color: var(--color-success-hover); color: #ffffff;}
			.btn-danger:active { background-color: var(--color-danger-hover); color: #ffffff; border-color: var(--color-danger-hover); }
			.btn-theme:active { color: var(--color-fg-default); background: var(--color-btn-hover-bg); }
			.btn-back-top:active { border-color: var(--color-accent-fg); }
		}

        .btn-back-top { color: var(--color-accent-fg); background-color: var(--color-canvas-overlay); }

        /* CHECKBOXES & RADIOS */
        .form-checkbox { 
            appearance: none; -webkit-appearance: none; margin: 3px 12px 0 0; cursor: pointer; width: 16px; height: 16px; flex-shrink: 0;
            border: 1px solid var(--color-border-default); border-radius: 4px; background-color: var(--color-canvas-body);
            position: relative; display: flex; align-items: center; justify-content: center; 
        }
        .form-checkbox:checked { background-color: var(--color-accent-fg); border-color: var(--color-accent-fg); }
        .form-checkbox::after {
            content: ''; width: 4px; height: 8px; border: solid #ffffff; border-width: 0 2px 2px 0;
            transform: rotate(45deg) scale(0); margin-bottom: 2px;
        }
        .form-checkbox:checked::after { transform: rotate(45deg) scale(1); }
        
        input[type="radio"] { 
            appearance: none; -webkit-appearance: none; width: 16px; height: 16px; 
            border: 1px solid var(--color-fg-muted); border-radius: 50%;
            margin: 3px 12px 0 0; outline: none; background-color: transparent; flex-shrink: 0; cursor: pointer;
        }
        input[type="radio"]:checked { border: 5px solid var(--color-accent-fg); border-color: var(--color-accent-fg); }

        .diff-add { background-color: var(--color-diff-add-bg); box-shadow: inset 4px 0 0 var(--color-success-emphasis); }
        .diff-del { background-color: var(--color-diff-del-bg); box-shadow: inset 4px 0 0 var(--color-danger-fg); }

        /* TEST LAYOUT */
        .test-layout { display: flex; gap: 32px; align-items: flex-start; } 
        .test-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
        .test-sidebar { 
            width: 270px; background: var(--color-canvas-overlay); border: 1px solid var(--color-border-default);
            border-radius: 6px; padding: 24px 16px; position: sticky; top: 20px; flex-shrink: 0;
        }
        
        .timer { font-size: 28px; font-weight: 600; text-align: center; font-variant-numeric: tabular-nums; letter-spacing: 1px; margin-top: 4px; }
        .timer.danger { color: var(--color-danger-fg); animation: pulse 1s infinite; }

        .q-grid-container { max-height: 280px; overflow-y: auto; overflow-x: hidden; padding-right: 14px; margin-top: 16px; }
        .q-grid-container::-webkit-scrollbar { width: 6px; }
        .q-grid-container::-webkit-scrollbar-track { background: transparent; }
        .q-grid-container::-webkit-scrollbar-thumb { background-color: var(--color-border-default); border-radius: 10px; }
        .q-grid-container::-webkit-scrollbar-thumb:hover { background-color: var(--color-fg-muted); }

        .q-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        
        .q-dot {
            aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500;
            min-height: 38px; border: 1px solid var(--color-border-default); border-radius: 6px; cursor: pointer;
            background: var(--color-canvas-body); color: var(--color-fg-default);
        }
        .q-dot:hover { border-color: var(--color-fg-muted); }
        .q-dot.active { border-color: var(--color-accent-fg); box-shadow: inset 0 0 0 1px var(--color-accent-fg); font-weight: 600; background: var(--color-canvas-overlay);}
        .q-dot.answered { background: var(--color-accent-muted); border-color: var(--color-accent-fg); color: var(--color-accent-fg); }
        .q-dot.wrong { background: var(--color-danger-fg); color: #fff; border-color: var(--color-danger-fg); }
        .q-dot.correct { background: var(--color-success-emphasis); color: #fff; border-color: var(--color-success-emphasis); }

        #test-screen, #result-screen, #view-screen { display: none; }
        .question-text { font-size: 16px; font-weight: 600; margin-bottom: 16px; line-height: 1.5; }
        
        .label { display: inline-flex; align-items: center; padding: 0 8px; font-size: 12px; font-weight: 500; height: 22px; border-radius: 2em; border: 1px solid var(--color-border-default); color: var(--color-fg-muted); }

        /* ANIMATIONS */
        @keyframes fadeInFast { from { opacity: 0; } to { opacity: 1; } }
        .fade-in { animation: fadeInFast 0.15s ease-in-out; }
        @keyframes fadeInSubtle { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .fade-screen { animation: fadeInSubtle 0.2s ease-out forwards; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        /* MODAL */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--color-overlay);
            display: flex; align-items: center; justify-content: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        
        .modal-content {
            background: var(--color-canvas-overlay); border: 1px solid var(--color-border-default);
            border-radius: 6px; width: 90%; max-width: 440px;
            box-shadow: var(--color-shadow-medium); 
            transform: translateY(10px); transition: transform 0.2s ease;
            display: flex; flex-direction: column; overflow: hidden;
        }
        .modal-overlay.active .modal-content { transform: translateY(0); }

		.mobile-view-btn { display: none !important; }
		
        /* RESPONSIVE */
		@media (max-width: 768px) {
            body { padding: 20px 10px; }
            .container { padding: 24px 16px; }
            .test-layout { flex-direction: column-reverse; gap: 24px; }
            .test-sidebar { width: 100%; position: relative; top: 0; }
            .q-grid-container { max-height: 200px; margin-right: 0; padding-right: 8px; }
            .q-grid { grid-template-columns: repeat(auto-fill, minmax(36px, 1fr)); }
            .nav-actions-wrapper { flex-direction: column; gap: 12px; }
            .nav-btn-group { width: 100%; }
            .nav-btn-group .btn { flex: 1; height: 40px; }
            #early-finish-btn { width: 100%; height: 40px; margin-left: 0; }
            
            /* ФІКСИ ДЛЯ ТЕЛЕФОНІВ */
            .range-mobile-wrap { flex-wrap: nowrap !important; }
            .range-mobile-wrap input { width: 60px; padding: 5px 8px; }
            
            .main-btns-mobile { flex-direction: column; width: 100%; gap: 12px; align-items: stretch; }
            .main-btns-mobile .btn { width: 100%; height: 40px; }
            #start-error { text-align: center; margin: 0; }

            .view-btn-mobile { width: 100%; height: 40px; justify-content: center; }
            
            .bottom-actions-mobile { flex-direction: column; gap: 12px; }
            .bottom-actions-mobile .btn { width: 100%; height: 40px; justify-content: center; }
			
			.desktop-view-btn { display: none !important; }
            .mobile-view-btn { display: flex !important; width: 100%; justify-content: center; height: 40px; }
        }
		
		#theme-btn svg {
			view-transition-name: none;
		}
    </style>
</head>
<body>

<svg style="display: none;">

</svg>

<div class="container fade-screen" id="main-container">
    
	<div class="flex justify-between items-center border-bottom pb-16 mb-24">
        <h1 class="header-title fs-24 flex items-center gap-8">Тестген</h1>
        <button class="btn btn-theme flex items-center justify-center" onclick="toggleTheme()" title="Змінити тему" id="theme-btn">
            <svg class="icon-lg"><use href="#icon-sun" id="theme-icon-use"></use></svg>
        </button>
    </div>

    <div id="setup-screen" style="display: none;">
        <div class="Box mb-24">
            <h3 class="Box-header">Вибір предмета</h3>
            <div class="Box-row flex-col cursor-default">

	function validateRange(changedField) {
		const fromInput = document.getElementById('range-from');
		const toInput = document.getElementById('range-to');
		const max = parseInt(toInput.max) || 1;

		let fromVal = parseInt(fromInput.value) || 1;
		let toVal = parseInt(toInput.value) || max;

		fromVal = Math.max(1, Math.min(fromVal, max));
		toVal = Math.max(1, Math.min(toVal, max));

		if (fromVal > toVal) {
			if (changedField === 'from') toVal = fromVal;
			else fromVal = toVal;
		}

		fromInput.value = fromVal;
		toInput.value = toVal;
	}

	function saveSettings() {
		localStorage.setItem('subject', document.getElementById('subject-select').value);
		localStorage.setItem('testMode', document.querySelector('input[name="testMode"]:checked').value);
		localStorage.setItem('immediateMode', document.getElementById('immediate-mode').checked);
		localStorage.setItem('rangeFrom', document.getElementById('range-from').value);
		localStorage.setItem('rangeTo', document.getElementById('range-to').value);

	function updateHint(isManualChange = false) {
		const subj = document.getElementById('subject-select').value;
		const allQuestions = parseText(databases[subj]);
		const count = allQuestions.length;
		
		document.getElementById('db-hint').innerText = `Доступно питань у базі: ${count}`;
		
		const fromInput = document.getElementById('range-from');
		const toInput = document.getElementById('range-to');
		
		fromInput.max = count;
		toInput.max = count;
		
		if (isManualChange) {
			fromInput.value = 1;
			toInput.value = count;
		} else {
			const savedFrom = localStorage.getItem('rangeFrom');
			const savedTo = localStorage.getItem('rangeTo');
			if (savedFrom && savedTo) {
				fromInput.value = Math.min(parseInt(savedFrom), count);
				toInput.value = Math.min(parseInt(savedTo), count);
			} else {
				fromInput.value = 1;
				toInput.value = count;
			}
		}
		
		validateRange();
		saveSettings();
	}

    function getLetter(index) { return String.fromCharCode(65 + index); }
	function formatQuestionHTML(text) { return escapeHTML((text || '').trim()); }
    function escapeHTML(str) {
        if (!str) return '';
        return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
    }
    
    function shuffle(array) {
        let arr = [...array];
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

	function cleanQuestionText(text) {
		text = text.replace(/<!--[\s\S]*?-->/g, '');
		
		let lines = text.split('\n');
		let processedLines = [];
		
		for (let i = 0; i < lines.length; i++) {
			let line = lines[i].trim();
			if (!line) {
				if (processedLines.length > 0 && processedLines[processedLines.length-1] !== '') processedLines.push('');
				continue;
			}

			if (/^(крок|база)\s+\d{4}/i.test(line) || 
				/^(ДИСЦИПЛІНА|РОЗДІЛ|ТЕМА|БІОЛОГІЯ|АНАТОМІЯ|ГІСТОЛОГІЯ)(\s|:|$)/i.test(line) ||
				/^№\s*\d+/i.test(line)) {
				continue;
			}
			
			if (/^Текст\s+задания\s*/i.test(line)) line = line.replace(/^Текст\s+задания\s*/i, '');
			
			if (processedLines.length > 0 && processedLines[processedLines.length-1] !== '') {
				processedLines[processedLines.length-1] += ' ' + line;
				continue;
			}
			
			processedLines.push(line);
		}
		return processedLines.join('\n').replace(/\n{3,}/g, '\n\n').trim();
	}

	function parseText(text) {
		if (!text) return [];
		
		const blocks = text.split(/(?:^|\n)(?:\d+[\.\)]|№\s*\d+)\s+/).filter(b => b.trim().length > 0);
		const parsed = [];

		blocks.forEach(block => {
			const match = block.match(/\n\s*(?:[A-ZА-ЯІЇЄҐ][\.\)]|Правильный\s+ответ\s)/i);
			
			if (match) {
				let qText = cleanQuestionText(block.substring(0, match.index).trim());
				const optionsPart = "\n" + block.substring(match.index).trim();
				
				const optsRaw = optionsPart.split(/\n\s*(?:Правильный\s+ответ\s*|[A-ZА-ЯІЇЄҐ][\.\)]|[A-ZА-ЯІЇЄҐ]\s+(?=[^\s]))/i).filter(o => o.trim().length > 0);
				
				let options = optsRaw.map((opt, index) => ({
					text: opt.replace(/;$/, '').trim(),
					isCorrect: index === 0
				}));

				if (options.length > 0 && qText.length > 0) {
					parsed.push({ 
						question: qText, 
						options: options,
						userAnswerIndex: null 
					});
				}
			}
		});
		return parsed;
	}

    function startTest() {
        const errorSpan = document.getElementById('start-error');
        errorSpan.style.display = 'none';

        saveSettings(); 
        const subj = document.getElementById('subject-select').value;
        const text = databases[subj];

        if (allQuestions.length === 0) { 
            errorSpan.innerText = 'Помилка: база порожня або невірний формат.';
            errorSpan.style.display = 'inline-block';
            return; 
        }

        isImmediateMode = document.getElementById('immediate-mode').checked;
        isControlMode = document.querySelector('input[name="testMode"]:checked').value === 'control';

		if (isControlMode) {
			allQuestions = shuffle(allQuestions);
			questions = allQuestions.slice(0, 50);
			document.getElementById('timer-label').innerText = 'Залишилось часу:';
		} else {
			let fromVal = parseInt(document.getElementById('range-from').value) || 1;
			let toVal = parseInt(document.getElementById('range-to').value) || allQuestions.length;
			
			let subset = allQuestions.slice(fromVal - 1, toVal);
			
			questions = shuffle(subset);
			document.getElementById('timer-label').innerText = 'Пройшло часу:';
		}

        questions.forEach(q => q.options = shuffle(q.options));
        currentQuestionIndex = 0;

        document.getElementById('setup-screen').style.display = 'none';
        const testScreen = document.getElementById('test-screen');
        testScreen.style.display = 'block';
        testScreen.classList.add('fade-screen');
        
        initGrid();
        renderQuestionHTML(true); 
        startTimer();
		saveGameState('test');
    }

        viewContainer.innerHTML = '';
        
        document.getElementById('setup-screen').style.display = 'none';
        const viewScreen = document.getElementById('view-screen');

        if (!isReload) {
            viewScreen.classList.remove('fade-screen');
            void viewScreen.offsetWidth;
            viewScreen.classList.add('fade-screen');
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        clearTimeout(renderViewTimeout);
        let currentIndex = 0;
        const CHUNK_SIZE = 20;

        function renderChunk() {
            let html = '';
            let max = Math.min(currentIndex + CHUNK_SIZE, allQuestions.length);
            
            for (let i = currentIndex; i < max; i++) {
                let q = allQuestions[i];
                html += `<div class="review-item"><div class="question-text">${i + 1}. ${formatQuestionHTML(q.question)}</div><div class="Box mb-0">`;
                
                q.options.forEach((opt, oIndex) => {
                    let isCorrect = (oIndex === 0);
                    let optClass = isCorrect ? 'diff-add' : '';
                    let label = isCorrect ? ' <span class="label ml-8">Правильно</span>' : '';
                    
                    html += `<div class="Box-row flex items-start cursor-default ${optClass}" style="pointer-events: none;">
                        <span><strong class="mr-6">${getLetter(oIndex)})</strong>${escapeHTML(opt.text)}${label}</span>
                    </div>`;
                });
                html += `</div></div>`;
            }

            viewContainer.insertAdjacentHTML('beforeend', html);
            currentIndex = max;

            if (currentIndex < allQuestions.length) {
                renderViewTimeout = setTimeout(renderChunk, 10);
            }
        }

        renderChunk();
        saveGameState('view');
    }

    function startTimer() {
        clearInterval(timerInterval);
        const now = Date.now();
        
        if (isControlMode) {
            targetEndTime = now + (30 * 60 * 1000);
            displayedSeconds = 30 * 60;
        } else {
            startTime = now;
            displayedSeconds = 0;
        }
        
        updateTimerDisplay();

        timerInterval = setInterval(() => {
            const currentTime = Date.now();
            if (isControlMode) {
                displayedSeconds = Math.ceil((targetEndTime - currentTime) / 1000);
                if (displayedSeconds <= 0) { 
                    displayedSeconds = 0;
                    clearInterval(timerInterval); 
                    finishTest(); 
                }
            } else { 
                displayedSeconds = Math.floor((currentTime - startTime) / 1000); 
            }
            updateTimerDisplay();
        }, 1000);
    }

    function updateTimerDisplay() {
        const tDisplay = document.getElementById('timer-display');
        const s = Math.abs(displayedSeconds);
        const m = Math.floor(s / 60);
        const sec = s % 60;
        tDisplay.innerText = `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        
        if (isControlMode && displayedSeconds <= 300) tDisplay.classList.add('danger');
        else tDisplay.classList.remove('danger');
    }

    function initGrid() {
        const grid = document.getElementById('q-nav-grid');
        grid.innerHTML = '';
        questions.forEach((_, idx) => {
            const dot = document.createElement('div');
            dot.className = 'q-dot';
            dot.innerText = idx + 1;
            dot.tabIndex = 0;
            dot.onclick = () => jumpToQuestion(idx);
            dot.onkeydown = (e) => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); jumpToQuestion(idx); } };
            dot.id = `dot-${idx}`;
            grid.appendChild(dot);
        });
    }

    function jumpToQuestion(idx) {
        if (currentQuestionIndex !== idx) {
            currentQuestionIndex = idx; 
            renderQuestionHTML(); 
        }
		saveGameState();
    }

	function updateGrid(isInitial = false) {
        questions.forEach((q, idx) => {
            const dot = document.getElementById(`dot-${idx}`);
            dot.className = 'q-dot';
            if (idx === currentQuestionIndex) dot.classList.add('active');
            else if (q.userAnswerIndex !== null) {
                if (isImmediateMode) {
                    dot.classList.add(q.options[q.userAnswerIndex].isCorrect ? 'correct' : 'wrong');
                } else {
                    dot.classList.add('answered');
                }
            }
        });
        
        const activeDot = document.getElementById(`dot-${currentQuestionIndex}`);
        const container = document.getElementById('grid-scroll-container');
        
        if(activeDot && container) { 
            if (window.innerWidth > 768) { 
                activeDot.scrollIntoView({ 
                    behavior: isInitial ? 'auto' : 'smooth', 
                    block: 'nearest' 
                });
            } else {
                const dotRect = activeDot.getBoundingClientRect();
                const containerRect = container.getBoundingClientRect();
                
                const relativeTop = dotRect.top - containerRect.top;
                const relativeBottom = dotRect.bottom - containerRect.top;

                if (relativeTop < 0) {
                    container.scrollBy({ top: relativeTop - 8, behavior: isInitial ? 'auto' : 'smooth' });
                } else if (relativeBottom > containerRect.height) {
                    container.scrollBy({ top: relativeBottom - containerRect.height + 8, behavior: isInitial ? 'auto' : 'smooth' });
                }
            }
        }
    }

    function renderQuestionHTML(isInitial = false) {
        const wrapper = document.getElementById('question-wrapper');
        const q = questions[currentQuestionIndex];
        
        wrapper.classList.remove('fade-in');
        void wrapper.offsetWidth;
        wrapper.classList.add('fade-in');
        
        document.getElementById('progress-text').innerText = `${currentQuestionIndex + 1} / ${questions.length}`;
        document.getElementById('btn-prev').disabled = currentQuestionIndex === 0;
        
        const isLast = currentQuestionIndex === questions.length - 1;
        const btnNext = document.getElementById('btn-next');
        
        if (isLast) {
            btnNext.innerHTML = `Завершити <svg class="icon ml-6"><use href="#icon-check"></use></svg>`;
            btnNext.onclick = finishTestPrompt;
        } else {
            btnNext.innerHTML = `Наступне <svg class="icon ml-6"><use href="#icon-next"></use></svg>`;
            btnNext.onclick = nextQuestion;
        }

        const hasAnswered = q.userAnswerIndex !== null;
        
        let html = `<div class="question-text">${formatQuestionHTML(q.question)}</div><div class="Box mb-0">`;
        q.options.forEach((opt, index) => {
            const isSelected = q.userAnswerIndex === index;
            let rowClass = 'Box-row flex items-start';
            
            if (hasAnswered && isImmediateMode) {
                rowClass += ' locked';
                if (opt.isCorrect) rowClass += ' diff-add';
                else if (isSelected) rowClass += ' diff-del';
            }

            html += `<label class="${rowClass}" id="opt-${index}">
                        <input type="radio" name="answer" value="${index}" 
                            ${isSelected ? 'checked' : ''} 
                            ${(hasAnswered && isImmediateMode) ? 'disabled' : ''}
                            onchange="selectAnswer(${index})">
                        <span><strong class="mr-6">${getLetter(index)})</strong>${escapeHTML(opt.text)}</span>
                    </label>`;
        });
        wrapper.innerHTML = html + `</div>`;
        updateGrid(isInitial);
    }

    function selectAnswer(selectedIndex) {
        const q = questions[currentQuestionIndex];
        q.userAnswerIndex = selectedIndex;

        if (isImmediateMode) {
            const rows = document.querySelectorAll('#question-wrapper .Box-row');
            const radios = document.querySelectorAll('#question-wrapper input[type="radio"]');
            radios.forEach(r => r.disabled = true);
            
            q.options.forEach((opt, idx) => {
                rows[idx].classList.add('locked');
                if (opt.isCorrect) rows[idx].classList.add('diff-add');
                else if (idx === selectedIndex) rows[idx].classList.add('diff-del');
            });
        }
        updateGrid();
		saveGameState();
    }

    function prevQuestion() { if (currentQuestionIndex > 0) { currentQuestionIndex--; renderQuestionHTML(); } saveGameState(); }
    function nextQuestion() { if (currentQuestionIndex < questions.length - 1) { currentQuestionIndex++; renderQuestionHTML(); } saveGameState(); }

    function finishTestPrompt() {
        const unanswered = questions.filter(q => q.userAnswerIndex === null).length;
        if (unanswered > 0) {
            document.getElementById('modal-text').innerHTML = `Ви не надали відповідь на <strong>${unanswered}</strong> питань.<br><span class="block mt-8">Бажаєте завершити тестування?</span>`;
            document.getElementById('custom-modal').classList.add('active');
        } else {
            finishTest();
        }
    }

    function closeModal() { document.getElementById('custom-modal').classList.remove('active'); }
    function confirmFinish() { closeModal(); finishTest(); }

	function finishTest(isReload = false) {
        clearInterval(timerInterval);
        clearTimeout(renderResultTimeout);

        document.getElementById('test-screen').style.display = 'none';

        const resultScreen = document.getElementById('result-screen');
        resultScreen.style.display = 'block';
        
        if (!isReload) resultScreen.classList.add('fade-screen');
        
        window.scrollTo({top: 0, behavior: 'smooth'});

        let score = 0;
        questions.forEach((q) => {
            if (q.userAnswerIndex !== null && q.options[q.userAnswerIndex].isCorrect) score++;
        });

        const percentage = Math.round((score / questions.length) * 100);
        const threshold = isControlMode ? 90 : 80;
        const colorClass = percentage >= threshold ? 'text-success' : 'text-danger';
        
        document.getElementById('final-score-percent').innerHTML = `<span class="${colorClass}">${percentage}%</span>`;
        document.getElementById('final-score-text').innerHTML = `Правильних відповідей: <strong>${score} з ${questions.length}</strong>`;
        
        const reviewContainer = document.getElementById('review-container');
        reviewContainer.innerHTML = '';

        if (!isReload) saveGameState('result');

        let currentIndex = 0;
        const CHUNK_SIZE = 20;

        function renderResultChunk() {
            let html = '';
            let max = Math.min(currentIndex + CHUNK_SIZE, questions.length);
            
            for (let i = currentIndex; i < max; i++) {
                let q = questions[i];
                html += `<div class="review-item"><div class="question-text">${i + 1}. ${formatQuestionHTML(q.question)}</div><div class="Box mb-0">`;
                
                q.options.forEach((opt, oIndex) => {
                    let optClass = opt.isCorrect ? 'diff-add' : (q.userAnswerIndex === oIndex ? 'diff-del' : '');
                    let userMark = q.userAnswerIndex === oIndex ? ' <span class="label ml-8">Обрано</span>' : (q.userAnswerIndex === null && opt.isCorrect ? ' <span class="label ml-8">Пропущено</span>' : '');
                    html += `<div class="Box-row flex items-start cursor-default ${optClass}" style="pointer-events: none;"><span><strong class="mr-6">${getLetter(oIndex)})</strong>${escapeHTML(opt.text)}${userMark}</span></div>`;
                });
                
                html += `</div></div>`;
            }

            reviewContainer.insertAdjacentHTML('beforeend', html);
            currentIndex = max;

            if (currentIndex < questions.length) {
                renderResultTimeout = setTimeout(renderResultChunk, 10);
            }
        }

        renderResultChunk();
    }
	
	function saveGameState(screenName) {
        let activeScreen = 'setup';
        if (document.getElementById('test-screen').style.display === 'block') activeScreen = 'test';
        else if (document.getElementById('result-screen').style.display === 'block') activeScreen = 'result';
        else if (document.getElementById('view-screen').style.display === 'block') activeScreen = 'view';

		const state = {
			questions,
			currentQuestionIndex,
			isImmediateMode,
			isControlMode,
			startTime,
			targetEndTime,
			screen: screenName || activeScreen
		};
		localStorage.setItem('testgen_progress', JSON.stringify(state));
	}

	function loadGameState() {
		const saved = localStorage.getItem('testgen_progress');
		if (!saved) {
			document.getElementById('setup-screen').style.display = 'block';
			return;
		}
		
		const state = JSON.parse(saved);

		questions = state.questions || [];
		currentQuestionIndex = state.currentQuestionIndex || 0;
		isImmediateMode = state.isImmediateMode || false;
		isControlMode = state.isControlMode || false;
		startTime = state.startTime || 0;
		targetEndTime = state.targetEndTime || 0;

		if (state.screen === 'setup' || !state.screen) {
			document.getElementById('setup-screen').style.display = 'block';
		} else if (state.screen === 'test') {
			document.getElementById('setup-screen').style.display = 'none';
			document.getElementById('test-screen').style.display = 'block';
			initGrid();
			renderQuestionHTML(true);
			resumeTimer();
		} else if (state.screen === 'result') {
			document.getElementById('setup-screen').style.display = 'none';
			finishTest(true);
		} else if (state.screen === 'view') {
			document.getElementById('setup-screen').style.display = 'none';
			startViewMode(true); 
		}
	}

	function resumeTimer() {
			clearInterval(timerInterval);

			const now = Date.now();
			if (isControlMode) {
				displayedSeconds = Math.ceil((targetEndTime - now) / 1000);
				if (displayedSeconds < 0) displayedSeconds = 0;
			} else {
				displayedSeconds = Math.floor((now - startTime) / 1000);
			}
			
			updateTimerDisplay();

			timerInterval = setInterval(() => {
				const currentTime = Date.now();
				if (isControlMode) {
					displayedSeconds = Math.ceil((targetEndTime - currentTime) / 1000);
					if (displayedSeconds <= 0) {
						displayedSeconds = 0;
						clearInterval(timerInterval);
						finishTest();
					}
				} else {
					displayedSeconds = Math.floor((currentTime - startTime) / 1000);
				}
				updateTimerDisplay();
			}, 1000);
		}
</script>
